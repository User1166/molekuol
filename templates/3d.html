{% extends "base.html" %}

{% block title %}{{ molekul.ad }} 3D Görselleştirme{% endblock %}

{% block content %}
<div class="container">
    <h1>{{ molekul.ad }} ({{ molekul.kimyasal_formul }})</h1>
    <div id="3d-viewer-wrapper">
        <div id="3d-viewer"></div>
    </div>
    <a href="{{ url_for('tum_molekuller') }}" class="btn btn-secondary">Geri Dön</a>
</div>
<script src="https://3dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const viewerElement = document.getElementById("3d-viewer");
        if (!viewerElement) {
            console.error("3D Viewer öğesi bulunamadı!");
            return;
        }
        const viewer = $3Dmol.createViewer(viewerElement, { backgroundColor: "white" });
        fetch(`/static/3d/{{ molekul.dosya_3d }}`)
            .then(response => response.text())
            .then(modelData => {
                viewer.addModel(modelData, "obj"); // .obj dosyasını yüklemek için "obj" formatı kullanılıyor
                viewer.zoomTo();
                viewer.render();
            })
            .catch(error => {
                console.error("3D dosyası yüklenirken hata oluştu:", error);
                viewerElement.innerText = "3D dosyası yüklenirken hata oluştu!";
            });
    });
</script>
{% endblock %}
